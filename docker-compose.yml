# Dev environment for pigeon-mobile — persistent containers for continuous
# build/test cycles.
#
# Two services because of a host-arch constraint: the Android NDK ships only
# x86_64 Linux toolchain binaries, so the Android cross-compile must run in an
# amd64 container (Rosetta-emulated on Apple Silicon). Core dev stays on the
# fast native arch.
#
#   # day-to-day core work (native arch — fast):
#   docker compose up -d dev
#   docker compose exec -w /workspace/pigeon-mobile/core dev cargo test
#
#   # Android cross-compile + app build (amd64 — emulated):
#   docker compose up -d android
#   docker compose exec android bash -c 'cd android && ./gradlew assembleDebug'
#
# The whole projects/ directory is mounted so the core's path-dependencies on
# ../pigeon resolve exactly as on the host. Cargo registry / target dirs and the
# Gradle cache live in named volumes so they persist and avoid slow bind I/O.
#
# Host path is portable: it defaults to `..` (this repo's parent, i.e. projects/),
# which is correct on any machine as long as the sibling layout is preserved:
#   <anywhere>/projects/pigeon-mobile  (this repo)
#   <anywhere>/projects/pigeon         (the homeserver, for the ../pigeon path-deps)
# Override with the PROJECTS_DIR env var (or a .env file) if your layout differs,
# e.g.  PROJECTS_DIR=/home/me/code docker compose up -d dev
services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: pigeon-mobile-dev
    container_name: pigeon-mobile-dev
    working_dir: /workspace/pigeon-mobile
    volumes:
      - ${PROJECTS_DIR:-..}:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - core-target:/workspace/pigeon-mobile/core/target
      - gradle-cache:/root/.gradle
    command: sleep infinity

  android:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: pigeon-mobile-android
    platform: linux/amd64
    container_name: pigeon-mobile-android
    working_dir: /workspace/pigeon-mobile
    volumes:
      - ${PROJECTS_DIR:-..}:/workspace
      - cargo-registry:/usr/local/cargo/registry
      # Separate target volume: amd64 artifacts must not mix with the arm64 dev's.
      - core-target-amd64:/workspace/pigeon-mobile/core/target
      - gradle-cache:/root/.gradle
    command: sleep infinity

volumes:
  cargo-registry:
  core-target:
  core-target-amd64:
  gradle-cache: