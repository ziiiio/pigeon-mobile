org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
# AGP 9 disallows Provider-based srcDir() on the legacy SourceSet API. Our Rust
# build glue (app/build.gradle.kts) feeds cargo-ndk's .so output and the generated
# UniFFI Kotlin in via layout.buildDirectory providers, and carries the task
# ordering explicitly (preBuild -> generateUniffiBindings -> cargoNdkBuild). Re-enable
# the provider form so that M0-proven wiring keeps working under AGP 9.
android.sourceset.disallowProvider=false