[package]
name = "pigeon-mobile-core"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
description = "Shared Rust core for the Pigeon mobile client (UniFFI)"

[lib]
name = "pigeon_mobile_core"
# lib: so the uniffi-bindgen bin can import the crate.
# cdylib: the native library loaded by Android/iOS (and the bindgen source).
# staticlib: for iOS static linking (Phase M5).
crate-type = ["lib", "cdylib", "staticlib"]

# Library-mode UniFFI: bindings are generated from the built cdylib by this bin,
# so the bindgen version stays pinned to the `uniffi` dependency below.
[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[dependencies]
# `tokio` feature: lets async `#[uniffi::export]` fns drive reqwest's futures on
# a Tokio runtime (register/login and, later, the sync loop) — M1.2.
uniffi = { version = "0.28", features = ["cli", "tokio"] }
thiserror = "1"
# The async runtime behind the FFI's async functions. `rt-multi-thread` gives
# UniFFI a runtime to spawn on; reqwest pulls the I/O features it needs.
# `macros` powers `#[tokio::test]` in the HTTP mock tests.
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# Client–Server API HTTP client (M1.1). Versions/features mirror the homeserver's
# client stack (../../pigeon/Cargo.toml) so the two agree on TLS + JSON behaviour:
# reqwest over rustls (no OpenSSL — important for the Android/iOS cross-builds).
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
    "json",
    "http2",
] }
serde_json = { version = "1", features = ["preserve_order"] }

# Local persistence (M2.1): the offline-first store (rooms, timeline, sync token,
# membership). `bundled` statically compiles SQLite into the cdylib, so the
# Android/iOS cross-builds carry no system-libsqlite dependency (cargo-ndk stays
# clean). Sync API — store ops are fast local I/O and stay off the FFI's async
# path; heavy scans can offload via `spawn_blocking`. (Decision flagged &
# approved: rusqlite over sqlx — lighter tree, no build-time DB, matches
# matrix-rust-sdk's SQLite store.)
rusqlite = { version = "0.31", features = ["bundled"] }

# Reused homeserver crates — the single source of crypto + protocol logic.
# Path deps into the sibling `pigeon` repo (see ../docs/ARCHITECTURE.md §4.1).
pigeon-core = { path = "../../pigeon/crates/core" }
pigeon-crypto = { path = "../../pigeon/crates/crypto" }

[dev-dependencies]
# In-process mock homeserver for HTTP-level tests of the api/session layer:
# asserts the request shape (method/path/body/bearer) and drives the P_-error
# mapping without a real server or Docker. The full oneshot-homeserver e2e
# (testcontainers) is a heavier, Docker-gated lane tracked separately.
wiremock = "0.6"
# Serialises tests that touch the process-global key store, so they don't race
# under cargo's parallel test runner.
serial_test = "3"