name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast lane: lint + unit-test the Rust core on the native runner arch (no NDK,
  # no Android SDK). Runs the same `cargo fmt`/`clippy`/`test` the dev container
  # gates on locally.
  core:
    runs-on: ubuntu-latest
    steps:
      # The core path-depends on ../pigeon/crates/*, so check both repos out as
      # siblings under the workspace (pigeon-mobile/ next to pigeon/).
      # NOTE: set `repository` (and a token if private) to your homeserver repo.
      - uses: actions/checkout@v4
        with:
          path: pigeon-mobile
      - uses: actions/checkout@v4
        with:
          repository: your-org/pigeon
          path: pigeon
          # token: ${{ secrets.PIGEON_REPO_TOKEN }}   # if the repo is private

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pigeon-mobile/core

      - name: fmt
        working-directory: pigeon-mobile/core
        # Scope to our package: `--all` would also format the sibling `pigeon`
        # crates pulled in as path-deps, letting their style drift fail our lane.
        run: cargo fmt -p pigeon-mobile-core --check
      - name: clippy
        working-directory: pigeon-mobile/core
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        working-directory: pigeon-mobile/core
        run: cargo test
      # M5.1: the Swift bindings are platform-independent (read from the built
      # library's metadata), so verify they generate on the Linux lane too — this
      # guards the shared-core → Swift boundary without needing macOS.
      - name: generate swift bindings (smoke)
        working-directory: pigeon-mobile/core
        run: |
          cargo build
          cargo run --bin uniffi-bindgen -- generate \
            --library target/debug/libpigeon_mobile_core.so \
            --language swift --out-dir target/bindings/swift
          test -f target/bindings/swift/pigeon_mobile_core.swift

  # Android lane: cross-compile the core (cargo-ndk) and assemble the app. The
  # ubuntu runner is amd64, so the NDK's x86_64 toolchain runs natively (no
  # emulation needed, unlike the Apple-Silicon dev container).
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pigeon-mobile
      - uses: actions/checkout@v4
        with:
          repository: your-org/pigeon
          path: pigeon
          # token: ${{ secrets.PIGEON_REPO_TOKEN }}   # if the repo is private

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # JDK 25 — AGP 9.2.1 / Gradle 9.6.1 need a modern JDK with a compiler.
          java-version: "25"
      - uses: android-actions/setup-android@v3
      - name: Install SDK 36 + NDK r28c
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pigeon-mobile/core
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: assembleDebug
        working-directory: pigeon-mobile/android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: ./gradlew assembleDebug --stacktrace

  # iOS lane (M5.1): cross-compile the core for the Apple targets, generate the
  # Swift bindings, and package the xcframework. macOS-only — the iOS SDK is
  # needed to link the Apple targets (incl. rusqlite's bundled SQLite) and
  # `xcodebuild -create-xcframework` is macOS-only. The Linux `core` lane already
  # smoke-checks that the Swift bindings *generate*; this lane proves they build.
  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          path: pigeon-mobile
      - uses: actions/checkout@v4
        with:
          repository: your-org/pigeon
          path: pigeon
          # token: ${{ secrets.PIGEON_REPO_TOKEN }}   # if the repo is private

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pigeon-mobile/core

      - name: build xcframework + Swift bindings
        working-directory: pigeon-mobile
        run: ios/build-core.sh

      # M5.2 — build the Hello-core smoke app against the xcframework and run it
      # on a simulator, asserting it renders the Rust-computed values and the
      # os_log LogSink round-trips (the iOS mirror of Android's assembleDebug +
      # emulator check). Fails the lane if the core→bindings→SwiftUI pipeline
      # regresses on-device.
      - name: build + run Hello-core on a simulator
        working-directory: pigeon-mobile/ios
        run: ./run-hellocore.sh

      # M5.3 — build the real Pigeon app (OS-integration layer: KeychainKeyStore,
      # OsLogSink, PhotoPicker, SyncController) and run its unit tests on a
      # simulator. The KeychainKeyStore suite exercises the real iOS Keychain
      # (ad-hoc signed for the keychain-access-group entitlement). The iOS
      # analogue of Android's testDebugUnitTest.
      - name: build + test the Pigeon app on a simulator
        working-directory: pigeon-mobile/ios
        run: ./run-tests.sh

      # M5.4 — launch the real Pigeon app on a simulator and assert it boots into
      # its SwiftUI UI (RootView → the M1–M4 screens) without crashing and that
      # the core's host callbacks install at process start. run-tests.sh proves it
      # compiles + unit-tests pass; this proves the app actually runs on-device
      # (the iOS-specific risk beyond the core, which is e2e-tested separately).
      - name: build + launch the Pigeon app on a simulator
        working-directory: pigeon-mobile/ios
        run: ./run-app.sh